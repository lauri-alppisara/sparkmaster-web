<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Support — Sparkmaster</title>
  <meta name="description" content="Sparkmaster support — contact support@sparkmaster.app">
  <link rel="canonical" href="https://sparkmaster.app/support.html">
  <link rel="icon" type="image/png" href="assets/app-icon.png">
  <style>
    :root {
      --bg: #05070c;
      --text: #f6f7fb;
      --muted: #a9afbd;
      --dim: #737a8b;
      --red: #ef2428;
      --line: rgba(255,255,255,0.10);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 50% 0%, rgba(239,36,40,0.12), transparent 32%), var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.65;
    }
    a { color: inherit; text-decoration-color: rgba(239,36,40,0.7); text-underline-offset: 0.18em; }
    a:hover { color: #fff; }
    .wrap { width: min(760px, calc(100% - 40px)); margin: 0 auto; padding: 32px 0 72px; }
    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 18px 0 34px; flex-wrap: wrap; }
    .brand { display: inline-flex; align-items: center; gap: 12px; text-decoration: none; font-weight: 800; }
    .brand img { width: 40px; height: 40px; border-radius: 10px; }
    .nav { display: flex; align-items: center; gap: 12px; color: var(--muted); font-size: 14px; flex-wrap: wrap; }
    .lang {
      display: inline-flex; flex-wrap: wrap; gap: 3px; padding: 4px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); border-radius: 999px;
    }
    .lang button {
      border: 0; border-radius: 999px; padding: 5px 8px; background: transparent;
      color: var(--muted); cursor: pointer; font: inherit; font-size: 11px; font-weight: 700;
    }
    .lang button.active { background: var(--red); color: #fff; }
    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.02));
      border: 1px solid var(--line); border-radius: 24px; padding: clamp(24px, 4vw, 48px);
    }
    h1 { margin: 0 0 12px; font-size: clamp(2rem, 5vw, 3rem); letter-spacing: -0.04em; line-height: 1.1; }
    p { color: var(--muted); margin: 10px 0; font-size: 16px; }
    .mail { display: inline-block; margin-top: 8px; color: #ffb4b6; font-weight: 700; font-size: 18px; text-decoration: none; }
    .mail:hover { color: #fff; }
    .footer { margin-top: 28px; color: var(--dim); font-size: 13px; text-align: center; }
  </style>
</head>
<body>
  <main class="wrap">
    <header class="topbar">
      <a class="brand" href="/">
        <img src="assets/app-icon.png" alt="" width="40" height="40">
        <span>Sparkmaster</span>
      </a>
      <nav class="nav">
        <a href="/" data-i18n="navHome">Home</a>
        <a href="privacy.html" data-i18n="navPrivacy">Privacy</a>
        <div class="lang" id="lang-switch" aria-label="Language"></div>
      </nav>
    </header>
    <article class="card">
      <h1 data-i18n="title">Support</h1>
      <p data-i18n="lead">Need help with Sparkmaster? Email us and we will get back to you.</p>
      <a class="mail" href="mailto:support@sparkmaster.app">support@sparkmaster.app</a>
      <p data-i18n="note">For privacy questions, see the Privacy Policy. For purchases and refunds, use Google Play order support.</p>
    </article>
    <footer class="footer">© 2026 Sparkmaster · Sublime Web Oy</footer>
  </main>
  <script>
    var LANGS = ['en','fi','de','es','fr','sv','ja','ko'];
    var T = {
      en: { navHome: 'Home', navPrivacy: 'Privacy', title: 'Support', lead: 'Need help with Sparkmaster? Email us and we will get back to you.', note: 'For privacy questions, see the Privacy Policy. For purchases and refunds, use Google Play order support.' },
      fi: { navHome: 'Etusivu', navPrivacy: 'Tietosuoja', title: 'Tuki', lead: 'Tarvitsetko apua Sparkmasteriin? Lähetä sähköpostia, palaamme asiaan.', note: 'Tietosuojakysymyksiin vastaa tietosuojaseloste. Ostoihin ja hyvityksiin käytä Google Playn tilaustukea.' },
      de: { navHome: 'Start', navPrivacy: 'Datenschutz', title: 'Support', lead: 'Hilfe zu Sparkmaster? Schreiben Sie uns — wir melden uns.', note: 'Datenschutzfragen: siehe Datenschutzerklärung. Käufe/Erstattungen über Google Play.' },
      es: { navHome: 'Inicio', navPrivacy: 'Privacidad', title: 'Soporte', lead: '¿Necesitas ayuda con Sparkmaster? Escríbenos y te responderemos.', note: 'Privacidad: consulta la política. Compras y reembolsos: soporte de pedidos de Google Play.' },
      fr: { navHome: 'Accueil', navPrivacy: 'Confidentialité', title: 'Assistance', lead: 'Besoin d’aide avec Sparkmaster ? Écrivez-nous, nous vous répondrons.', note: 'Confidentialité : voir la politique. Achats/remboursements : assistance Google Play.' },
      sv: { navHome: 'Hem', navPrivacy: 'Integritet', title: 'Support', lead: 'Behöver du hjälp med Sparkmaster? Mejla oss så återkommer vi.', note: 'Integritetsfrågor: se integritetspolicyn. Köp/återbetalning: Google Plays orderstöd.' },
      ja: { navHome: 'ホーム', navPrivacy: 'プライバシー', title: 'サポート', lead: 'Sparkmaster のサポートが必要な場合はメールでご連絡ください。', note: 'プライバシーはポリシーをご覧ください。購入・返金は Google Play の注文サポートへ。' },
      ko: { navHome: '홈', navPrivacy: '개인정보', title: '지원', lead: 'Sparkmaster 도움이 필요하시면 이메일로 문의해 주세요.', note: '개인정보는 처리방침을 참고하세요. 구매·환불은 Google Play 주문 지원을 이용하세요.' }
    };
    function setLanguage(lang) {
      if (!T[lang]) lang = 'en';
      document.documentElement.lang = lang;
      var pack = T[lang];
      document.querySelectorAll('[data-i18n]').forEach(function (el) {
        var key = el.getAttribute('data-i18n');
        if (pack[key]) el.textContent = pack[key];
      });
      document.querySelectorAll('#lang-switch button').forEach(function (btn) {
        btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
      });
      try { localStorage.setItem('sparkmaster-lang', lang); } catch (e) {}
    }
    (function () {
      var switcher = document.getElementById('lang-switch');
      LANGS.forEach(function (id) {
        var b = document.createElement('button');
        b.type = 'button';
        b.textContent = id.toUpperCase();
        b.setAttribute('data-lang', id);
        b.addEventListener('click', function () { setLanguage(id); });
        switcher.appendChild(b);
      });
      var start = 'en';
      try {
        var saved = localStorage.getItem('sparkmaster-lang');
        if (saved && T[saved]) start = saved;
        else {
          var nav = (navigator.language || 'en').slice(0, 2).toLowerCase();
          if (T[nav]) start = nav;
        }
      } catch (e) {}
      setLanguage(start);
    })();
  </script>
</body>
</html>
